spring.application.name=bookdemo11

# Loaded from .env via spring-dotenv
stripe.secret-key=${STRIPE_SECRET_KEY:sk_test_placeholder}
stripe.publishable-key=${STRIPE_PUBLISHABLE_KEY:pk_test_placeholder}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:whsec_placeholder}
app.base-url=${APP_BASE_URL:http://localhost:8081}

# H2 in-memory (default for demo)
spring.datasource.url=jdbc:h2:mem:thestar;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.thymeleaf.cache=false
spring.servlet.multipart.max-file-size=8MB
spring.servlet.multipart.max-request-size=8MB

server.port=8081

# Switch to MySQL: uncomment and set profile mysql
# spring.profiles.active=mysql