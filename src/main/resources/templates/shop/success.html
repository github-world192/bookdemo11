<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('訂單完成')}"></head>
<body>
<div th:replace="~{fragments/layout :: header}"></div>
<main class="container">
    <div class="card" style="text-align:center;padding:3rem">
        <div style="font-size:4rem">🛍️</div>
        <h1>購物訂單成立！</h1>
        <p th:if="${order}" th:text="'訂單編號：#' + ${order.shopOrderId}">編號</p>
        <p th:if="${order}" th:text="'實付金額：NT$ ' + ${order.actualAmount}">金額</p>
        <p th:if="${order and order.payMethod == '1'}" class="badge badge-success">Stripe 付款成功</p>
        <a th:href="@{/shop/orders}" class="btn btn-primary" style="margin-top:1rem">查看購物紀錄</a>
    </div>
</main>
<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
