<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('首頁')}"></head>
<body>
<div th:replace="~{fragments/layout :: header}"></div>

<section class="hero">
    <div class="container">
        <h1 th:text="${hotelSubtitle}">東方之星度假飯店</h1>
        <p>引進國際級度假體驗，重新定義南台灣海岸度假新標準</p>
        <a th:href="@{/rooms}" class="btn btn-primary">立即訂房</a>
        <a th:href="@{/about}" class="btn btn-outline" style="margin-left:.5rem">了解更多</a>
    </div>
</section>

<main class="container">
    <div th:if="${param.logout}" class="alert alert-success">您已成功登出</div>

    <div class="search-bar">
        <form th:action="@{/rooms}" method="get" style="display:flex;gap:1rem;flex-wrap:wrap;align-items:end;width:100%">
            <div class="form-group" style="margin:0">
                <label>入住日期</label>
                <input type="date" name="checkIn" class="form-control" required
                       th:value="${#temporals.format(#temporals.createToday().plusDays(1), 'yyyy-MM-dd')}">
            </div>
            <div class="form-group" style="margin:0">
                <label>退房日期</label>
                <input type="date" name="checkOut" class="form-control" required
                       th:value="${#temporals.format(#temporals.createToday().plusDays(2), 'yyyy-MM-dd')}">
            </div>
            <button type="submit" class="btn btn-secondary">查詢空房</button>
        </form>
    </div>

    <h2 style="color:var(--primary-dark);margin-bottom:1.5rem">精選房型</h2>
    <div class="grid-3">
        <div class="card room-card" th:each="rt : ${roomTypes}">
            <div style="height:180px;background:linear-gradient(135deg,#2f6f6f,#4a9a9a);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:3rem">🏨</div>
            <h3 th:text="${rt.roomTypeName}">房型</h3>
            <p th:text="${#strings.abbreviate(rt.roomTypeContent, 60)}">介紹</p>
            <p class="price" th:text="'NT$ ' + ${rt.roomTypePrice} + ' / 晚'">價格</p>
            <p><span class="badge" th:text="'可住 ' + ${rt.guestNum} + ' 人'">人數</span></p>
            <a th:href="@{/rooms/{id}(id=${rt.roomTypeId})}" class="btn btn-secondary" style="margin-top:.5rem">查看詳情</a>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
