<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/admin-layout :: admin-head('訂房管理')}"></head>
<body>
<div class="admin-layout">
    <div th:replace="~{fragments/admin-layout :: admin-sidebar}"></div>
    <div class="admin-content">
        <h1>訂房管理</h1>
        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

        <table>
            <thead>
            <tr><th>編號</th><th>會員</th><th>入住</th><th>退房</th><th>金額</th><th>狀態</th><th>付款</th><th>操作</th></tr>
            </thead>
            <tbody>
            <tr th:each="o : ${orders}">
                <td th:text="'#' + ${o.roomOrderId}"></td>
                <td th:text="${o.member.memberName}"></td>
                <td th:text="${o.checkInDate}"></td>
                <td th:text="${o.checkOutDate}"></td>
                <td th:text="'NT$ ' + ${o.actualAmount}"></td>
                <td>
                    <span th:switch="${o.orderStatus}">
                        <span th:case="1">已確認</span>
                        <span th:case="2">已入住</span>
                        <span th:case="3">已退房</span>
                        <span th:case="4">已取消</span>
                        <span th:case="*">待處理</span>
                    </span>
                </td>
                <td th:text="${o.payStatus == '1' ? '已付' : '未付'}"></td>
                <td style="white-space:nowrap">
                    <form th:if="${o.orderStatus == 1}" th:action="@{/admin/orders/{id}/checkin(id=${o.roomOrderId})}" method="post" style="display:inline">
                        <button class="btn btn-secondary" style="font-size:.75rem">Check-in</button>
                    </form>
                    <form th:if="${o.orderStatus == 2}" th:action="@{/admin/orders/{id}/checkout(id=${o.roomOrderId})}" method="post" style="display:inline">
                        <button class="btn btn-secondary" style="font-size:.75rem">Check-out</button>
                    </form>
                    <form th:if="${o.orderStatus == 1}" th:action="@{/admin/orders/{id}/cancel(id=${o.roomOrderId})}" method="post" style="display:inline">
                        <button class="btn btn-secondary" style="font-size:.75rem" onclick="return confirm('確定取消？')">取消</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
