<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('會員中心')}"></head>
<body>
<div th:replace="~{fragments/layout :: header}"></div>
<main class="container">
    <h1>會員中心</h1>
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem">
        <div class="card">
            <h3>個人資料</h3>
            <form th:action="@{/member/profile}" method="post">
                <div class="form-group">
                    <label>姓名</label>
                    <input type="text" name="memberName" class="form-control" th:value="${member.memberName}">
                </div>
                <div class="form-group">
                    <label>電話</label>
                    <input type="tel" name="memberPhone" class="form-control" th:value="${member.memberPhone}">
                </div>
                <div class="form-group">
                    <label>地址</label>
                    <input type="text" name="memberAddress" class="form-control" th:value="${member.memberAddress}">
                </div>
                <div class="form-group">
                    <label>生日</label>
                    <input type="date" name="memberBirthday" class="form-control" th:value="${member.memberBirthday}">
                </div>
                <button type="submit" class="btn btn-secondary">更新資料</button>
            </form>
        </div>

        <div class="card">
            <h3>帳號資訊</h3>
            <p><strong>信箱：</strong><span th:text="${member.memberEmail}"></span></p>
            <p><strong>會員等級：</strong><span th:text="${member.memberLevel}"></span></p>
            <p><strong>優惠券：</strong>STAR500（新會員折抵 NT$500）</p>
            <a th:href="@{/booking/records}" class="btn btn-primary">查看訂房紀錄</a>
        </div>
    </div>

    <div class="card" style="margin-top:1.5rem">
        <h3>最近訂房</h3>
        <table th:if="${!#lists.isEmpty(orders)}">
            <thead><tr><th>編號</th><th>入住</th><th>退房</th><th>金額</th><th>狀態</th></tr></thead>
            <tbody>
            <tr th:each="o : ${orders}">
                <td th:text="'#' + ${o.roomOrderId}"></td>
                <td th:text="${o.checkInDate}"></td>
                <td th:text="${o.checkOutDate}"></td>
                <td th:text="'NT$ ' + ${o.actualAmount}"></td>
                <td th:text="${o.orderStatus}"></td>
            </tr>
            </tbody>
        </table>
        <p th:if="${#lists.isEmpty(orders)}">尚無訂房紀錄</p>
    </div>
</main>
<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
