<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('會員登入')}"></head>
<body>
<div th:replace="~{fragments/layout :: header}"></div>
<main class="container" style="max-width:480px">
    <div class="card">
        <h2>會員登入</h2>
        <div th:if="${param.error}" class="alert alert-danger">帳號或密碼錯誤</div>
        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <form th:action="@{/member/login}" method="post">
            <div class="form-group">
                <label>電子信箱</label>
                <input type="email" name="username" class="form-control" required placeholder="member@test.com">
            </div>
            <div class="form-group">
                <label>密碼</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%">登入</button>
        </form>
        <p style="margin-top:1rem;text-align:center">
            還沒有帳號？<a th:href="@{/member/register}">立即註冊</a>
        </p>
        <p style="font-size:.85rem;color:#888;text-align:center">測試帳號：member@test.com / 123456</p>
    </div>
</main>
<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
