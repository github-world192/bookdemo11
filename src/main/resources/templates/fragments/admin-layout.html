<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="admin-head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' | The Star 後台'">後台</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:fragment="admin-sidebar" class="admin-sidebar">
    <h3 style="margin-top:0">The Star</h3>
    <p style="font-size:.85rem;opacity:.7">後台管理系統</p>
    <p th:if="${currentEmployee}" style="font-size:.8rem;opacity:.8;margin-bottom:1rem">
        <span th:text="${currentEmployee.employeeName}">員工</span>
        <span th:if="${isSuperAdmin}" class="badge badge-warning" style="font-size:.7rem">系統管理員</span>
        <span th:unless="${isSuperAdmin}" th:if="${adminPrincipal}"
              class="badge" style="font-size:.7rem" th:text="${adminPrincipal.departmentName}"></span>
    </p>

    <a sec:authorize="hasAuthority('DASHBOARD_VIEW') or hasRole('ADMIN')" th:href="@{/admin/dashboard}">儀表板</a>
    <a sec:authorize="hasAuthority('EMPLOYEE_MANAGE') or hasRole('ADMIN')" th:href="@{/admin/employees}">員工管理</a>
    <a sec:authorize="hasAuthority('ROLE_MANAGE') or hasRole('ADMIN')" th:href="@{/admin/org}">組織設定</a>
    <a sec:authorize="hasAuthority('ROOM_TYPE_MANAGE') or hasRole('ADMIN')" th:href="@{/admin/room-types}">房型管理</a>
    <a sec:authorize="hasAuthority('ROOM_MANAGE') or hasRole('ADMIN')" th:href="@{/admin/rooms}">房間管理</a>
    <a sec:authorize="hasAuthority('ORDER_MANAGE') or hasRole('ADMIN')" th:href="@{/admin/orders}">訂房管理</a>
    <a sec:authorize="hasAuthority('MEMBER_MANAGE') or hasRole('ADMIN')" th:href="@{/admin/members}">會員管理</a>
    <hr style="border-color:rgba(255,255,255,.2)">
    <a th:href="@{/home}">返回前台</a>
    <a th:href="@{/admin/logout}">登出</a>
</div>
</body>
</html>
