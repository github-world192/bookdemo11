<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' | The Star'">The Star</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
<header th:fragment="header" class="site-header">
    <div class="container">
        <a th:href="@{/home}" class="brand">
            <span class="brand-icon">★</span>
            <span>The Star 東方之星</span>
        </a>
        <nav class="nav-links">
            <a th:href="@{/home}">首頁</a>
            <a th:href="@{/rooms}">房型展示</a>
            <a th:href="@{/shop}">飯店商城</a>
            <a th:href="@{/about}">關於我們</a>
            <a th:href="@{/facilities}">設施介紹</a>
            <a th:href="@{/faq}">FAQ</a>
            <span sec:authorize="isAuthenticated()">
                <a th:href="@{/member/center}">會員中心</a>
                <a th:href="@{/booking/records}">訂房紀錄</a>
                <a th:href="@{/shop/cart}">購物車</a>
                <a th:href="@{/shop/orders}">購物紀錄</a>
                <a th:href="@{/member/logout}">登出</a>
            </span>
            <span sec:authorize="!isAuthenticated()">
                <a th:href="@{/member/login}">登入</a>
                <a th:href="@{/member/register}">註冊</a>
            </span>
            <a th:href="@{/admin/login}" style="opacity:.7;font-size:.85rem">後台</a>
        </nav>
    </div>
</header>

<footer th:fragment="footer" class="site-footer">
    <div class="container">
        <p>&copy; 2026 The Star 東方之星度假飯店 · 墾丁海岸度假新標準</p>
    </div>
</footer>
</body>
</html>
