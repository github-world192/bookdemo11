<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('房型展示')}"></head>
<body>
<div th:replace="~{fragments/layout :: header}"></div>
<main class="container">
    <h1 style="color:var(--primary-dark)">房型展示 & 空房查詢</h1>

    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div class="search-bar">
        <form th:action="@{/rooms}" method="get" style="display:flex;gap:1rem;flex-wrap:wrap;align-items:end;width:100%">
            <div class="form-group" style="margin:0">
                <label>入住日期</label>
                <input type="date" name="checkIn" class="form-control" required th:value="${checkIn}">
            </div>
            <div class="form-group" style="margin:0">
                <label>退房日期</label>
                <input type="date" name="checkOut" class="form-control" required th:value="${checkOut}">
            </div>
            <button type="submit" class="btn btn-secondary">查詢空房</button>
        </form>
    </div>

    <div class="grid-3">
        <div class="card room-card" th:each="rt : ${roomTypes}">
            <div style="height:160px;background:linear-gradient(135deg,#2f6f6f,#6ab);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:2.5rem">🛏</div>
            <h3 th:text="${rt.roomTypeName}">房型</h3>
            <p th:text="${#strings.abbreviate(rt.roomTypeContent, 80)}">介紹</p>
            <p class="price" th:text="'NT$ ' + ${rt.roomTypePrice} + ' / 晚'">價格</p>
            <p>
                <span class="badge" th:text="'可住 ' + ${rt.guestNum} + ' 人'">人數</span>
                <span class="badge badge-success" th:if="${availability[rt.roomTypeId]} > 0"
                      th:text="'剩餘 ' + ${availability[rt.roomTypeId]} + ' 間'">空房</span>
                <span class="badge badge-danger" th:if="${availability[rt.roomTypeId]} == 0">已客滿</span>
            </p>
            <a th:href="@{/rooms/{id}(id=${rt.roomTypeId}, checkIn=${checkIn}, checkOut=${checkOut})}"
               class="btn btn-secondary">查看 & 預訂</a>
        </div>
    </div>
</main>
<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
